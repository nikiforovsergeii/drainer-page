<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Permit Test</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
</head>
<body>
    <button onclick="signPermit()">Сгенерировать Permit для USDT</button>

    <script>
        async function signPermit() {
            if (typeof window.ethereum === 'undefined') {
                alert("MetaMask not found");
                return;
            }
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            const signer = provider.getSigner();

            const tokenAddress = "0x55d398326f99059fF775485246999027B3197955"; // USDT
            const contractAddress = "0xA1722bC16a0A0CFb68aC6795f84d96baC7dB88d7"; // твой контракт
            const amount = ethers.utils.parseUnits("1", 18); // 1 USDT
            const deadline = Math.floor(Date.now() / 1000) + 3600;

            const token = new ethers.Contract(tokenAddress, [
                "function nonces(address) view returns (uint256)",
                "function DOMAIN_SEPARATOR() view returns (bytes32)"
            ], signer);

            const nonce = await token.nonces(await signer.getAddress());

            const domain = {
                name: "Tether USD",
                version: "1",
                chainId: 56,
                verifyingContract: tokenAddress
            };

            const types = {
                Permit: [
                    { name: "owner", type: "address" },
                    { name: "spender", type: "address" },
                    { name: "value", type: "uint256" },
                    { name: "nonce", type: "uint256" },
                    { name: "deadline", type: "uint256" }
                ]
            };

            const value = {
                owner: await signer.getAddress(),
                spender: contractAddress,
                value: amount,
                nonce: nonce,
                deadline: deadline
            };

            const signature = await signer._signTypedData(domain, types, value);
            console.log("Signature:", signature);
            alert("Подпись сгенерирована! Смотри консоль (F12)");
        }
    </script>
</body>
</html>
